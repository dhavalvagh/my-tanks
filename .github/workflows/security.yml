name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ─── CodeQL Static Analysis (SAST) ─────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.36.2
        with:
          category: "/language:${{ matrix.language }}"

  # ─── Trivy Vulnerability Scanner ───────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret,misconfig'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.36.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Run Trivy (table for summary)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-table.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,misconfig'
          exit-code: '1'

      - name: Trivy summary
        if: always()
        run: |
          echo "## 🛡️ Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s trivy-table.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-table.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo '✅ No vulnerabilities found' >> $GITHUB_STEP_SUMMARY
          fi

  # ─── OWASP Dependency-Check (NVD) ──────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'my-tanks'
          path: '.'
          format: 'HTML,JSON,SARIF'
          args: >
            --enableExperimental
            --nodeAuditAnalyzerEnabled true
            --failOnCVSS 7

      - name: Upload OWASP DC results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.36.2
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: 'owasp-dependency-check'

      - name: Upload OWASP DC HTML report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/

      - name: OWASP summary
        if: always()
        run: |
          echo "## 🏛️ OWASP Dependency-Check" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/dependency-check-report.json ]; then
            vulns=$(cat reports/dependency-check-report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for dep in d.get('dependencies',[]) if dep.get('vulnerabilities')))" 2>/dev/null || echo '?')
            echo "Vulnerable dependencies found: **${vulns}**" >> $GITHUB_STEP_SUMMARY
          else
            echo '✅ No vulnerabilities with CVSS >= 7' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 Full HTML report available as artifact" >> $GITHUB_STEP_SUMMARY

  # ─── OSV-Scanner (Google's Vulnerability DB) ───────────────────
  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --format=json
            --output=osv-results.json

      - name: Upload OSV results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: osv-scanner-results
          path: osv-results.json

      - name: OSV summary
        if: always()
        run: |
          echo "## 🔍 OSV-Scanner Results" >> $GITHUB_STEP_SUMMARY
          if [ -s osv-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat osv-results.json | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo '✅ No known vulnerabilities in lockfile' >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Dependency Review (PR only) ───────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ─── Secret Scanning ───────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@v3.95.6
        with:
          extra_args: --only-verified --results=verified,unknown

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Secrets summary
        if: always()
        run: |
          echo "## 🔑 Secret Detection Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Gitleaks + TruffleHog + Trivy — no secrets detected" >> $GITHUB_STEP_SUMMARY

  # ─── Final Gate (all must pass) ────────────────────────────────
  security-status:
    name: Security Status
    runs-on: ubuntu-latest
    needs: [codeql, trivy, owasp-dependency-check, osv-scanner, secrets-scan]
    if: always()
    steps:
      - name: Check all security jobs
        run: |
          echo "## 🏁 Security Analysis — Final Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql.result == 'success' && '✅ Pass' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅ Pass' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Dependency-Check | ${{ needs.owasp-dependency-check.result == 'success' && '✅ Pass' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner | ${{ needs.osv-scanner.result == 'success' && '✅ Pass' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks+TruffleHog+Trivy) | ${{ needs.secrets-scan.result == 'success' && '✅ Pass' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Hard fail if ANY job failed
          if [[ "${{ needs.codeql.result }}" != "success" || \
                "${{ needs.trivy.result }}" != "success" || \
                "${{ needs.owasp-dependency-check.result }}" != "success" || \
                "${{ needs.osv-scanner.result }}" != "success" || \
                "${{ needs.secrets-scan.result }}" != "success" ]]; then
            echo "::error::❌ One or more security scans FAILED. Deployment blocked."
            echo "🚫 **DEPLOYMENT BLOCKED** — Fix all failing scans before deploying." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **All security scans passed** — safe to deploy." >> $GITHUB_STEP_SUMMARY
